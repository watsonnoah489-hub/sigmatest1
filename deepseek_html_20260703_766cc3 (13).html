<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="tab-title">IXL | Dashboard</title>
    <link id="tab-favicon" rel="icon" type="image/x-icon" href="https://www.ixl.com/favicon.ico">
    <style>
        :root {
            --primary-color: #3b82f6;
            --glow-color: rgba(59, 130, 246, 0.95);
            --bg-url: url('https://tse2.mm.bing.net/th/id/OIP.f5HM4GcWYCV8lkGR3MiqjAHaDt?rs=1&pid=ImgDetMain&o=7&rm=3');
            --game-shape: 50%;
        }
        body {
            background-image: var(--bg-url);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        body.low-lag {
            background-image: none !important;
            background-color: #050505 !important;
        }
        body.low-lag .circle {
            background-image: none !important;
            background-color: #1a1a1a !important;
            box-shadow: 0 0 10px var(--primary-color) !important;
        }
        body.low-lag .circle::before {
            opacity: 0.2 !important;
            animation: none !important;
        }
        body.low-lag #matrixCanvas {
            display: none !important;
        }
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.5s;
            mix-blend-mode: screen;
        }
        body.rain-active #matrixCanvas {
            opacity: 0.65;
        }
        .header,
        .controls,
        .grid,
        .soundboard-section,
        #previewModal,
        #overlay {
            position: relative;
            z-index: 10;
        }

        .header {
            background: rgba(13, 17, 23, 0.92);
            padding: 15px 40px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
            width: 70%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(6px);
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 35px var(--glow-color);
        }
        .header .subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.7);
            padding: 18px 30px;
            border-radius: 50px;
            align-items: center;
            border: 1px solid var(--primary-color);
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px var(--glow-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px 20px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto 40px auto;
        }

        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInUp 0.7s ease forwards;
            opacity: 0;
        }

        .circle {
            width: 155px;
            height: 155px;
            border-radius: var(--game-shape);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            margin: 0 auto;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 20px var(--glow-color), 0 0 40px rgba(138, 43, 226, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.2);
        }

        .circle::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: inherit;
            background: transparent;
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 30px var(--primary-color), 0 0 60px #8a2be2, inset 0 0 20px rgba(255, 255, 255, 0.5);
            opacity: 0.7;
            z-index: 1;
            pointer-events: none;
            animation: pulseGlow 3s infinite alternate;
        }

        .circle:hover {
            transform: scale(1.12);
            box-shadow: 0 0 40px var(--glow-color), 0 0 80px #a855f7, inset 0 0 25px white;
            border-color: var(--primary-color);
        }
        .circle:hover::before {
            opacity: 1;
            border-width: 4px;
            animation: pulseGlowFast 1.2s infinite alternate;
        }

        @keyframes pulseGlow {
            0% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
            }
        }
        @keyframes pulseGlowFast {
            0% {
                opacity: 0.7;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1.02);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .label {
            margin-top: 12px;
            font-weight: 900;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 10.5px;
            width: fit-content;
            max-width: 145px;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 15px var(--glow-color);
            display: block;
            word-break: break-word;
        }

        .star {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 34px;
            cursor: pointer;
            text-shadow: 0 0 20px gold;
            z-index: 10;
        }

        .dice-card .circle {
            background: linear-gradient(135deg, #eab308, #f59e0b) !important;
            font-size: 68px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            background: var(--primary-color);
            transition: all 0.3s;
            box-shadow: 0 0 12px var(--primary-color);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn:hover {
            filter: brightness(1.35);
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--primary-color);
        }
        .btn-danger {
            background: #dc2626;
            box-shadow: 0 0 12px #ff4444;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .rainbow-btn {
            background: linear-gradient(135deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 200% 200%;
            animation: rainbowShift 2s ease infinite;
        }
        @keyframes rainbowShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        .rain-toggle.active {
            background: #00cc99;
            box-shadow: 0 0 25px #00ffc3;
        }
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
        }
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s;
        }
        .loader-bar {
            width: 280px;
            height: 8px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
        }
        .loader-fill {
            width: 0%;
            height: 100%;
            background: var(--primary-color);
            transition: 5s linear;
            box-shadow: 0 0 15px cyan;
        }
        .loading-tip {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            font-style: italic;
            max-width: 400px;
            text-align: center;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .custom-bg-area {
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 12px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .drag-area {
            border: 1px dashed #aaa;
            border-radius: 30px;
            padding: 5px 12px;
            background: #1a1a1a;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .drag-area:hover {
            background: #2a2a2a;
            border-color: var(--primary-color);
        }
        select {
            background: #1a1a2e;
            color: white;
            border: 1px solid var(--primary-color);
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: bold;
        }
        .soundboard-section {
            max-width: 1400px;
            margin: 0 auto 40px auto;
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px 28px;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 25px var(--glow-color);
        }
        .soundboard-header {
            font-size: 28px;
            font-weight: bold;
            border-left: 6px solid var(--primary-color);
            padding-left: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .soundboard-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: space-around;
        }
        .sound-item {
            background: rgba(0, 0, 0, 0.65);
            border-radius: 28px;
            padding: 20px;
            flex: 1;
            min-width: 260px;
            border: 1px solid rgba(59, 130, 246, 0.6);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
        }
        .sound-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }
        .sound-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
            background: linear-gradient(135deg, #fff, #a0c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .control-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 15px 0 12px;
        }
        .sound-btn {
            background: #2d3e5f;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 5px var(--primary-color);
        }
        .sound-btn:hover {
            background: var(--primary-color);
            transform: scale(1.03);
        }
        .loop-label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e2a3a;
            padding: 5px 12px;
            border-radius: 40px;
        }
        .speed-slider {
            width: 140px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }
        .speed-value {
            background: #000000aa;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.8rem;
            font-family: monospace;
        }
        .mute-note {
            font-size: 12px;
            background: #000000aa;
            padding: 4px 12px;
            border-radius: 20px;
            margin-left: 15px;
        }
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input {
            display: none;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked+.slider {
            background-color: var(--primary-color);
        }
        input:checked+.slider:before {
            transform: translateX(26px);
        }
        .toggle-label {
            font-size: 0.9rem;
            color: #ddd;
        }
        .others-section {
            margin: 40px auto;
            max-width: 1400px;
            padding: 20px;
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 25px var(--glow-color);
        }
        .others-header {
            font-size: 28px;
            font-weight: bold;
            border-left: 6px solid var(--primary-color);
            padding-left: 20px;
            margin-bottom: 25px;
        }

        /* Filter controls */
        #filterControls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        #searchInput {
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid var(--primary-color);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 14px;
            flex: 1;
            min-width: 180px;
            max-width: 350px;
            outline: none;
            transition: 0.3s;
        }
        #searchInput:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px var(--glow-color);
        }
        #searchInput::placeholder {
            color: #aaa;
        }
        .category-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 6px 16px;
            color: #ccc;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .category-btn:hover {
            background: rgba(59, 130, 246, 0.25);
            border-color: var(--primary-color);
            color: white;
        }
        .category-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
            box-shadow: 0 0 15px var(--glow-color);
        }
        .category-btn.all-active {
            background: #8b5cf6;
            border-color: #8b5cf6;
            color: white;
            box-shadow: 0 0 15px #8b5cf6;
        }
        .filter-clear {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff4444;
            color: #ff8888;
        }
        .filter-clear:hover {
            background: rgba(255, 0, 0, 0.4);
        }
        @media (max-width: 700px) {
            #filterControls {
                flex-direction: column;
                align-items: stretch;
            }
            #searchInput {
                max-width: 100%;
            }
            .category-btn {
                padding: 4px 12px;
                font-size: 10px;
            }
        }
    </style>
</head>

            // ---------- FILTER LOGIC ----------
            function filterGames() {
                const search = searchQuery.toLowerCase().trim();
                const selected = selectedCategories;
                return games.filter(game => {
                    if (game.category === 'others') return true;
                    if (search && !game.name.toLowerCase().includes(search)) return false;
                    if (selected.length > 0) {
                        const hasCategory = selected.some(cat => game.categories.includes(cat));
                        if (!hasCategory) return false;
                    }
                    return true;
                });
            }

            // ---------- RENDER GAMES ----------
            window.renderGames = () => {
                const grid = document.getElementById('gameGrid');
                const othersGrid = document.getElementById('othersGrid');
                grid.innerHTML =
                    '<div class="game-card dice-card"><div class="circle" onclick="launchRandom()">🎲</div><div class="label">RANDOM GAME</div></div>';

                const filtered = filterGames();
                const others = filtered.filter(g => g.category === 'others');
                const mainGames = filtered.filter(g => g.category !== 'others');

                const favs = mainGames.filter(g => favorites.includes(g.id));
                const rest = mainGames.filter(g => !favorites.includes(g.id));
                const sorted = [...favs, ...rest];

                sorted.forEach(g => {
                    grid.innerHTML += '<div class="game-card"><div class="circle" onclick="showPreview(\'' + g
                        .id +
                        '\')" style="background-image:url(\'' + g.img +
                        '\')"><span class="star" onclick="event.stopImmediatePropagation();toggleFavorite(\'' +
                        g.id + '\');">' + (favorites.includes(g.id) ? '★' : '☆') +
                        '</span></div><div class="label">' + g.name + '</div></div>';
                });

                const othersFiltered = games.filter(g => g.category === 'others');
                othersGrid.innerHTML = '';
                othersFiltered.forEach(g => {
                    if (searchQuery && !g.name.toLowerCase().includes(searchQuery.toLowerCase())) return;
                    othersGrid.innerHTML += '<div class="game-card"><div class="circle" onclick="showPreview(\'' +
                        g.id +
                        '\')" style="background-image:url(\'' + g.img +
                        '\')"><span class="star" onclick="event.stopImmediatePropagation();toggleFavorite(\'' +
                        g.id + '\');">' + (favorites.includes(g.id) ? '★' : '☆') +
                        '</span></div><div class="label">' + g.name + '</div></div>';
                });

                // Update game counter
                const totalGames = games.filter(g => g.category !== 'others').length;
                const counterEl = document.getElementById('gameCounter');
                if (counterEl) {
                    counterEl.textContent = '🎮 ' + totalGames + ' games available';
                }
            };

            // ---------- CATEGORY BUTTONS ----------
            const categoryList = ['FNAF', 'Subway Surfers', 'Duck Life', 'Mario', 'Horror', 'Runner', 'Stickman', 'Sports', 'Meme', "Baldi's Basics", 'Survival', 'Puzzle', 'Mortal Kombat', 'Learn to Fly', 'Card', 'Clicker'];

            function buildCategoryButtons() {
                const container = document.getElementById('categoryButtons');
                container.innerHTML = '';
                const allBtn = document.createElement('button');
                allBtn.className = 'category-btn all-active';
                allBtn.textContent = 'All';
                allBtn.dataset.cat = 'all';
                allBtn.addEventListener('click', function() {
                    selectedCategories = [];
                    updateCategoryButtons();
                    renderGames();
                });
                container.appendChild(allBtn);

                categoryList.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn';
                    btn.textContent = cat;
                    btn.dataset.cat = cat;
                    btn.addEventListener('click', function() {
                        const idx = selectedCategories.indexOf(cat);
                        if (idx > -1) {
                            selectedCategories.splice(idx, 1);
                        } else {
                            selectedCategories.push(cat);
                        }
                        updateCategoryButtons();
                        renderGames();
                    });
                    container.appendChild(btn);
                });
            }

            function updateCategoryButtons() {
                const btns = document.querySelectorAll('#categoryButtons .category-btn');
                btns.forEach(btn => {
                    const cat = btn.dataset.cat;
                    if (cat === 'all') {
                        btn.classList.toggle('all-active', selectedCategories.length === 0);
                    } else {
                        btn.classList.toggle('active', selectedCategories.includes(cat));
                    }
                });
            }

            // ---------- SEARCH ----------
            document.getElementById('searchInput').addEventListener('input', function() {
                searchQuery = this.value;
                renderGames();
            });

            document.getElementById('clearFiltersBtn').addEventListener('click', function() {
                searchQuery = '';
                document.getElementById('searchInput').value = '';
                selectedCategories = [];
                updateCategoryButtons();
                renderGames();
            });

            // ---------- MATRIX RAIN ----------
            const matrixCanvas = document.getElementById('matrixCanvas');
            const mctx = matrixCanvas.getContext('2d');
            let mw, mh, drops = [];
            const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&".split("");

            function initRain() {
                mw = window.innerWidth;
                mh = window.innerHeight;
                matrixCanvas.width = mw;
                matrixCanvas.height = mh;
                const colCount = Math.floor(mw / 20);
                drops = Array(colCount).fill(0).map(() => Math.floor(Math.random() * -mh / 20));
            }

            function drawRain() {
                if (!rainActive) return;
                const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim();
                let rc1, rc2;
                if (primaryColor.startsWith('#')) {
                    const r = parseInt(primaryColor.slice(1, 3), 16),
                        g = parseInt(primaryColor.slice(3, 5), 16),
                        b = parseInt(primaryColor.slice(5, 7), 16);
                    rc1 = 'rgba(' + r + ',' + g + ',' + b + ',0.9)';
                    rc2 = 'rgba(' + Math.min(r + 50, 255) + ',' + Math.min(g + 50, 255) + ',255,0.9)';
                } else {
                    rc1 = '#a0f0ff';
                    rc2 = '#20ff80';
                }
                mctx.fillStyle = 'rgba(0,0,0,0.05)';
                mctx.fillRect(0, 0, mw, mh);
                mctx.font = "20px 'Courier New', monospace";
                mctx.shadowColor = primaryColor;
                mctx.shadowBlur = 12;
                for (let i = 0; i < drops.length; i++) {
                    mctx.fillStyle = i % 2 ? rc1 : rc2;
                    mctx.fillText(matrixChars[Math.floor(Math.random() * matrixChars.length)], i * 20, drops[i] * 20);
                    if (drops[i] * 20 > mh && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
                mctx.shadowBlur = 0;
                rainAnimFrame = requestAnimationFrame(drawRain);
            }

                dragZone.addEventListener('click', () => {
                    const url = prompt('Paste image URL:');
                    if (url) document.documentElement.style.setProperty('--bg-url', 'url(\'' + url + '\')');
                });
                document.getElementById('deleteDataBtn').addEventListener('click', deleteAllSavedData);
                document.getElementById('fullscreenBtn').addEventListener('click', () => {
                    const iframe = document.getElementById('screen');
                    if (iframe.requestFullscreen) iframe.requestFullscreen();
                });
                document.getElementById('rainToggleBtn').addEventListener('click', toggleRain);
                document.getElementById('rainbowColorBtn').addEventListener('click', toggleRainbowMode);
                document.getElementById('sigmaToggleBtn').addEventListener('click', toggleSigmaMode);

                document.addEventListener('keydown', e => {
                    if (e.key !== '6' && e.code !== 'Numpad6') return;
                    const el = e.target;
                    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el
                        .isContentEditable)) return;
                    e.preventDefault();
                    window.open(IXL_QUICK_URL, '_blank', 'noopener,noreferrer');
                });

                buildCategoryButtons();
                renderGames();
                initMenuMusic();
                buildSoundboard();
            });
        })();
    </script>
</body>
</html>
